<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Família - Área ACS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="areacas.css">
    <link rel="stylesheet" href="cadfam.css">
</head>
<body>

<header class="topo-pagina">
    <a href="index.html"><img src="img/semfindo.png" alt="Logo" class="logo"></a>
    <h2 class="titulo">Cadastrar Família</h2>
    <a href="acsarea.html" class="btn-voltar">← Voltar</a>
</header>

<main class="container-listagem">
    <form id="formVisita" onsubmit="event.preventDefault(); salvarFamilia();">
        <div class="endereco-familia">
            <div class="campo-item full-width">
                <label>Endereço da Família:</label>
                <input type="text" id="endereco" placeholder="Rua, Número, Bairro" required>
            </div>
        </div>

        <div id="containerMembros">
            <div class="membro-bloco">
                <h3>Membro 1</h3>
                <div class="campo-item">
                    <label>Nome Completo:</label>
                    <input type="text" class="casa" required>
                </div>
                <div class="campo-item curto">
                    <label>Nascimento:</label>
                    <input type="text" class="nascimento" placeholder="DD/MM/AAAA" maxlength="10" oninput="mascaraData(this)" required>
                </div>
                <div class="campo-item curto">
                    <label>Sexo:</label>
                    <select class="sexo" required>
                        <option value="">Selecione</option>
                        <option value="M">Masculino</option>
                        <option value="F">Feminino</option>
                        <option value="O">Outros</option>
                    </select>
                </div>
                <div class="campo-item curto">
                    <label>CPF:</label>
                    <input type="text" class="cpf" placeholder="000.000.000-00" maxlength="14" oninput="mascaraCPF(this)" required>
                </div>
                <div class="campo-item curto">
                    <label>Celular:</label>
                    <input type="tel" class="celular" placeholder="(00) 00000-0000" maxlength="15" oninput="mascaraCelular(this)" required>
                </div>
                <div class="checkbox-group">
                    <label class="check-item"><input type="checkbox" class="hipertenso"> Hipertenso</label>
                    <label class="check-item"><input type="checkbox" class="diabetico"> Diabético</label>
                    <label class="check-item"><input type="checkbox" class="prenatal"> Gestante</label>
                    <label class="check-item"><input type="checkbox" class="vacina"> Vacina Atrasada</label>
                </div>
            </div>
        </div>

        <div class="botoes">
            <button type="button" class="btn-adicionar" onclick="adicionarNovoCampo()">+ Adicionar Membro</button>
            <button type="submit" class="btn-salvar">SALVAR FAMÍLIA</button>
        </div>
    </form>

    <div class="relatorio">
        <h3>Resumo do Cadastro</h3>
        <p>Membros: <span id="res-visitas">1</span> | Gestantes: <span id="res-gestantes">0</span> | Hipertensos: <span id="res-hipertensos">0</span> | Diabéticos: <span id="res-diabeticos">0</span> | Idosos: <span id="res-idosos">0</span> | Crianças: <span id="res-criancas">0</span></p>
        <ul id="alertas" class="lista-alertas"></ul>
    </div>
</main>

<footer>
    <p>© 2026 - SevenSys</p>
</footer>

<script>
    // --- MÁSCARAS DE VALIDAÇÃO ---
    function mascaraData(input) {
        let v = input.value.replace(/\D/g, "");
        if (v.length > 8) v = v.substring(0, 8);
        if (v.length >= 2) v = v.substring(0, 2) + "/" + v.substring(2);
        if (v.length >= 5) v = v.substring(0, 5) + "/" + v.substring(5, 9);
        input.value = v;
    }

    function mascaraCPF(input) {
        let v = input.value.replace(/\D/g, "");
        if (v.length >= 3) v = v.substring(0, 3) + "." + v.substring(3);
        if (v.length >= 7) v = v.substring(0, 7) + "." + v.substring(7);
        if (v.length >= 11) v = v.substring(0, 11) + "-" + v.substring(11, 13);
        input.value = v;
    }

    function mascaraCelular(input) {
        // Remove tudo o que não for número
        let v = input.value.replace(/\D/g, "");
        
        // Limita estritamente a digitação em no máximo 11 números puros
        if (v.length > 11) {
            v = v.substring(0, 11);
        }

        // Aplica a formatação em tempo real: (XX) XXXXX-XXXX
        if (v.length >= 2) {
            v = "(" + v.substring(0, 2) + ") " + v.substring(2);
        }
        if (v.length >= 10) { // Considera os caracteres da máscara já adicionados acima
            v = v.substring(0, 10) + "-" + v.substring(10);
        }
        
        input.value = v;
    }

    // --- LÓGICA DO SISTEMA ---
    function salvarFamilia() {
        const endereco = document.getElementById('endereco').value;
        const loginAtivo = sessionStorage.getItem('loginUsuario');
        const blocosMembros = document.querySelectorAll('.membro-bloco');

        if (!loginAtivo) {
            alert("Sessão expirada. Faça login novamente.");
            return;
        }

        let camposValidos = true;
        const listaMembros = [];

        blocosMembros.forEach((bloco) => {
            const nome = bloco.querySelector('.casa').value;
            const nascimento = bloco.querySelector('.nascimento').value;
            const sexo = bloco.querySelector('.sexo').value;
            const cpf = bloco.querySelector('.cpf').value;
            const celular = bloco.querySelector('.celular').value;

            // Valida o preenchimento e comprimentos mínimos (Celular formatado completo tem 15 caracteres)
            if (!nome || nascimento.length < 10 || !sexo || cpf.length < 14 || celular.length < 15) {
                camposValidos = false;
                return;
            }

            listaMembros.push({
                nome: nome,
                nascimento: nascimento,
                sexo: sexo,
                cpf: cpf,
                celular: celular,
                hipertenso: bloco.querySelector('.hipertenso').checked,
                diabetico: bloco.querySelector('.diabetico').checked,
                gestante: bloco.querySelector('.prenatal').checked,
                vacina: bloco.querySelector('.vacina').checked
            });
        });

        if (!camposValidos || endereco === "") {
            alert("Por favor, preencha corretamente todos os campos obrigatórios e verifique as formatações.");
            return;
        }

        const chaveLista = loginAtivo + '_lista_familias';
        let lista = JSON.parse(localStorage.getItem(chaveLista) || "[]");

        const novaFamilia = {
            id: Date.now(),
            primeiroMembro: listaMembros[0].nome,
            endereco: endereco,
            data: new Date().toLocaleDateString('pt-BR'),
            membros: listaMembros
        };

        lista.push(novaFamilia);
        localStorage.setItem(chaveLista, JSON.stringify(lista));

        // Atualiza contadores
        localStorage.setItem(loginAtivo + '_totalFamilias', lista.length);
        localStorage.setItem(loginAtivo + '_totalPendentes', lista.length);

        alert("Família completa cadastrada!");
        window.location.href = "acsarea.html";
    }

    function adicionarNovoCampo() {
        const container = document.getElementById('containerMembros');
        const numMembros = container.querySelectorAll('.membro-bloco').length + 1;
        
        const novoMembro = document.querySelector('.membro-bloco').cloneNode(true);
        novoMembro.querySelector('h3').textContent = "Membro " + numMembros;
        
        // Limpa valores clonados
        novoMembro.querySelectorAll('input').forEach(input => input.value = "");
        novoMembro.querySelectorAll('select').forEach(select => select.value = "");
        novoMembro.querySelectorAll('input[type="checkbox"]').forEach(check => check.checked = false);
        
        container.appendChild(novoMembro);
        document.getElementById('res-visitas').textContent = numMembros;
    }
</script>
</body>
</html>
