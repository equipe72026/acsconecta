<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico de Visitas - Área ACS</title>
    <link rel="stylesheet" href="ui.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="areacas.css">
    <style>
        .container-listagem { padding: 20px; max-width: 900px; margin: auto; }
        .busca-container { margin-bottom: 20px; }
        #inputBusca { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; }
        
        .familia-item { 
            background: white; 
            padding: 20px; 
            margin-bottom: 15px; 
            border-radius: 8px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            border-left: 6px solid #27ae60; /* Verde para visitas concluídas */
        }
        
        .info-principal { margin-bottom: 10px; }
        .nome-familia { font-size: 1.2em; color: #2c3e50; display: block; }
        .endereco-familia { color: #666; font-size: 0.9em; margin: 5px 0; }
        
        .tag-data { 
            background: #27ae60; 
            color: white; 
            padding: 3px 10px; 
            border-radius: 12px; 
            font-size: 0.8em; 
            font-weight: bold;
        }

        .relatorio-box {
            margin-top: 15px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 6px;
            border: 1px dashed #ccc;
            font-style: italic;
            color: #444;
        }
        
        .id-visit { color: #999; font-weight: bold; margin-right: 10px; }

        /* Estilização das Ações adicionadas */
        .acoes-visita {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .btn-editar,
        .btn-excluir {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 999px;
            cursor: pointer;
            font-size: 0.9em;
            transition: transform 150ms ease, box-shadow 150ms ease, background 150ms ease;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        .btn-editar {
            background-color: #109ea3;
        }

        .btn-excluir {
            background-color: #e74c3c;
        }

        .btn-editar:hover,
        .btn-excluir:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.12);
        }

        .btn-editar:hover { background-color: #0d7d82; }
        .btn-excluir:hover { background-color: #c0392b; }

        .btn-editar:hover { background-color: #1f618d; }
        .btn-excluir:hover { background-color: #c0392b; }

        /* Modal de edição de relatório */
        .modal-edicao-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: opacity 180ms ease, visibility 180ms ease;
        }

        .modal-edicao-overlay.open {
            opacity: 1;
            visibility: visible;
        }

        .modal-edicao-box {
            width: 100%;
            max-width: 560px;
            background: #ffffff;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 24px 70px rgba(0, 0, 0, 0.18);
            transform: translateY(-8px);
            opacity: 0;
            transition: transform 220ms ease, opacity 220ms ease;
        }

        .modal-edicao-overlay.open .modal-edicao-box {
            transform: translateY(0);
            opacity: 1;
        }

        .modal-edicao-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 22px;
            border-bottom: 1px solid #e9edf2;
            background: #f8fbfc;
        }

        .modal-edicao-title {
            font-size: 1rem;
            font-weight: 700;
            color: #1f2937;
        }

        .modal-edicao-close {
            border: none;
            background: transparent;
            font-size: 1.6rem;
            color: #667085;
            cursor: pointer;
            line-height: 1;
            padding: 4px 8px;
            border-radius: 999px;
            transition: background 150ms ease, color 150ms ease;
        }

        .modal-edicao-close:hover {
            background: rgba(16, 158, 163, 0.08);
            color: #0b5e63;
        }

        .modal-edicao-body {
            padding: 18px 22px 16px;
            background: #f7fbfd;
        }

        .modal-edicao-body p {
            margin: 0 0 12px;
            color: #475569;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .modal-edicao-body textarea {
            width: 100%;
            min-height: 190px;
            border: 1px solid #cbd5e1;
            border-radius: 14px;
            padding: 16px;
            font-size: 0.96rem;
            line-height: 1.7;
            font-family: 'Segoe UI', Arial, sans-serif;
            resize: vertical;
            background: #ffffff;
            color: #1f2937;
            box-shadow: inset 0 1px 2px rgba(15, 23, 42, 0.06);
        }

        .modal-edicao-body textarea:focus {
            outline: none;
            border-color: #109ea3;
            box-shadow: 0 0 0 4px rgba(16, 158, 163, 0.12);
            background: #ffffff;
        }

        .modal-edicao-footer {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            padding: 16px 22px 22px;
            background: #f8fbfc;
        }

        .modal-edicao-button {
            border: none;
            border-radius: 999px;
            padding: 12px 20px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 140ms ease, opacity 140ms ease;
        }

        .modal-edicao-button:hover {
            transform: translateY(-1px);
            opacity: 0.98;
        }

        .modal-edicao-button.cancel {
            background: #eef2f7;
            color: #475569;
        }

        .modal-edicao-button.save {
            background: #109ea3;
            color: white;
            box-shadow: 0 12px 24px rgba(16, 158, 163, 0.16);
        }
    </style>
</head>
<body>
    <script src="ui.js"></script>

<header class="topo-pagina">
    <a href="index.html"><img src="img/semfindo.png" alt="Logo" class="logo"></a>
    <h2 class="titulo">Histórico de Visitas Realizadas</h2>
    <a href="acsarea.html" class="btn-voltar">← Voltar</a>
</header>

<main class="container-listagem">
    <div class="busca-container">
        <input type="text" id="inputBusca" placeholder="Buscar por família, endereço ou relatório..." onkeyup="filtrarVisitas()">
    </div>

    <div id="listaVisitas"></div>
</main>

<script>
    const loginAtivo = sessionStorage.getItem('loginUsuario');
    const chaveHistorico = loginAtivo + '_historico_visitas';

    document.addEventListener('DOMContentLoaded', function() {
        if (!loginAtivo) {
            window.location.href = "login.html";
            return;
        }
        renderizarVisitas();
    });

    function renderizarVisitas() {
        const container = document.getElementById('listaVisitas');
        const historico = JSON.parse(localStorage.getItem(chaveHistorico) || "[]");

        if (historico.length === 0) {
            container.innerHTML = `
                <div style="text-align:center; margin-top:50px; color:#666;">
                    <p>Nenhuma visita realizada por enquanto.</p>
                </div>`;
            return;
        }

        container.innerHTML = "";

        // Mapeia mantendo o índice real do array original antes do reverse para as funções funcionarem corretamente
        const historicoMapeado = historico.map((v, idx) => ({ ...v, indiceOriginal: idx }));
        
        // Inverte para exibir as mais recentes primeiro
        historicoMapeado.reverse().forEach((v, index) => {
            const div = document.createElement('div');
            div.className = 'familia-item';
            div.innerHTML = `
                <div class="familia-resumo">
                    <div class="info-principal">
                        <span class="id-visit">#${historico.length - index}</span>
                        <strong class="nome-familia">${v.nomeFamilia}</strong>
                        <p class="endereco-familia">${v.endereco}</p>
                    </div>
                    <div class="info-indicadores">
                        <span class="tag-data">Realizada em: ${v.dataVisita}</span>
                    </div>
                    <div class="relatorio-box">
                        <strong>Relatório:</strong> "${v.relatorio}"
                    </div>
                    <div class="acoes-visita">
                        <button class="btn-editar" onclick="editarRelatorio(${v.indiceOriginal})">Editar Relatório</button>
                        <button class="btn-excluir" onclick="excluirVisita(${v.indiceOriginal})">Excluir Visita</button>
                    </div>
                </div>
            `;
            container.appendChild(div);
        });
    }

    let relatorioEditIndex = null;

    function editarRelatorio(index) {
        const historico = JSON.parse(localStorage.getItem(chaveHistorico) || "[]");
        relatorioEditIndex = index;
        const textarea = document.getElementById('textareaRelatorio');
        textarea.value = historico[index]?.relatorio || '';
        document.getElementById('modalEditarRelatorio').classList.add('open');
        textarea.focus();
    }

    function fecharModalEdicao() {
        const modal = document.getElementById('modalEditarRelatorio');
        modal.classList.remove('open');
        relatorioEditIndex = null;
    }

    function salvarEdicaoRelatorio() {
        const novoTexto = document.getElementById('textareaRelatorio').value.trim();
        if (novoTexto === '') {
            showToast('warning', 'Relatório vazio', 'Por favor, escreva um relatório antes de salvar.');
            return;
        }

        const historico = JSON.parse(localStorage.getItem(chaveHistorico) || "[]");
        if (relatorioEditIndex === null || !historico[relatorioEditIndex]) {
            showToast('error', 'Erro interno', 'Não foi possível salvar a edição. Tente novamente.');
            fecharModalEdicao();
            return;
        }

        historico[relatorioEditIndex].relatorio = novoTexto;
        localStorage.setItem(chaveHistorico, JSON.stringify(historico));
        fecharModalEdicao();
        renderizarVisitas();
        showToast('success', 'Relatório atualizado', 'Relatório atualizado com sucesso!');
    }

    function excluirVisita(index) {
        ssConfirm({
            titulo: 'Excluir visita',
            subtitulo: 'Registro será movido para pendentes.',
            mensagem: 'Deseja realmente excluir este registro de visita? O painel será atualizado.',
            tipo: 'danger',
            textoBotao: 'Excluir',
            onConfirm: function() {
                let historico = JSON.parse(localStorage.getItem(chaveHistorico) || "[]");
                
                historico.splice(index, 1);
                localStorage.setItem(chaveHistorico, JSON.stringify(historico));

                let visitasFeitas = parseInt(localStorage.getItem(loginAtivo + '_totalVisitas') || 0);
                let visitasPendentes = parseInt(localStorage.getItem(loginAtivo + '_totalPendentes') || 0);

                if (visitasFeitas > 0) visitasFeitas--;
                visitasPendentes++;

                localStorage.setItem(loginAtivo + '_totalVisitas', visitasFeitas);
                localStorage.setItem(loginAtivo + '_totalPendentes', visitasPendentes);

                renderizarVisitas();
                showToast('success', 'Visita atualizada', 'Registro de visita excluído! A visita retornou para a lista de Pendentes.');
            }
        });
    }

    // Função de filtro em tempo real
    function filtrarVisitas() {
        const busca = document.getElementById('inputBusca').value.toLowerCase();
        const itens = document.querySelectorAll('.familia-item');
        
        itens.forEach(item => {
            const texto = item.innerText.toLowerCase();
            item.style.display = texto.includes(busca) ? "block" : "none";
        });
    }
</script>

<div id="modalEditarRelatorio" class="modal-edicao-overlay" onclick="if (event.target === this) fecharModalEdicao()">
    <div class="modal-edicao-box" role="dialog" aria-modal="true" aria-labelledby="modalEditarRelatorioTitle">
        <div class="modal-edicao-header">
            <div>
                <div class="modal-edicao-title" id="modalEditarRelatorioTitle">Editar Relatório</div>
                <p style="margin:6px 0 0; font-size:0.92rem; color:#475569;">Revise o texto e toque em salvar para atualizar o registro.</p>
            </div>
            <button class="modal-edicao-close" type="button" onclick="fecharModalEdicao()" aria-label="Fechar">×</button>
        </div>
        <div class="modal-edicao-body">
            <p>Digite o relatório da visita para manter o histórico atualizado.</p>
            <textarea id="textareaRelatorio" placeholder="Atualize o relatório da visita aqui..."></textarea>
        </div>
        <div class="modal-edicao-footer">
            <button class="modal-edicao-button cancel" type="button" onclick="fecharModalEdicao()">Cancelar</button>
            <button class="modal-edicao-button save" type="button" onclick="salvarEdicaoRelatorio()">Salvar alterações</button>
        </div>
    </div>
</div>

</body>
</html>
</html>
